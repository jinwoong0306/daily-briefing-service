<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Feedback - Daily Briefing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#b3c5ff",
                        "tertiary-container": "#ca4101",
                        "on-primary-container": "#f5f5ff",
                        "surface": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "outline": "#737687",
                        "on-surface": "#1a1c1c",
                        "on-tertiary-container": "#fff4f0",
                        "inverse-surface": "#2f3131",
                        "secondary-fixed": "#dbe1ff",
                        "secondary-fixed-dim": "#b3c5ff",
                        "surface-container-highest": "#e2e2e2",
                        "tertiary-fixed-dim": "#ffb59c",
                        "on-secondary-fixed-variant": "#294387",
                        "surface-bright": "#f9f9f9",
                        "secondary": "#425ba0",
                        "on-tertiary-fixed-variant": "#832700",
                        "surface-container-low": "#f3f3f4",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#00174a",
                        "inverse-primary": "#b3c5ff",
                        "on-surface-variant": "#424656",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "secondary-container": "#9bb4ff",
                        "on-secondary-fixed": "#00174a",
                        "on-tertiary-fixed": "#390c00",
                        "on-background": "#1a1c1c",
                        "tertiary": "#a03200",
                        "surface-variant": "#e2e2e2",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "inverse-on-surface": "#f0f1f1",
                        "on-primary-fixed-variant": "#003ea6",
                        "primary-container": "#0064ff",
                        "tertiary-fixed": "#ffdbd0",
                        "background": "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "surface-tint": "#0054d8",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dadada",
                        "on-secondary-container": "#294487",
                        "outline-variant": "#c2c6d8",
                        "primary": "#004ecb"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface selection:bg-primary-fixed-dim">
<!-- Top Navigation Anchor (Task-Focused - Suppression logic applies to Shell, but TopAppBar as 'Back' action is rendered) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full shadow-sm shadow-zinc-200/50 dark:shadow-none">
<div class="bg-gradient-to-r from-blue-600 to-blue-800 h-[2px] w-full absolute top-0 left-0"></div>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-zinc-900 dark:text-zinc-100" data-icon="close">close</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-zinc-900 dark:text-zinc-100 text-base">Daily Briefing</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="min-h-screen flex flex-col items-center justify-center px-6 pt-24 pb-12 max-w-2xl mx-auto">
<!-- Header Section -->
<div class="text-center mb-12">
<div class="mb-6 inline-flex p-4 rounded-full bg-surface-container-low text-primary">
<span class="material-symbols-outlined text-[32px]" data-icon="auto_awesome">auto_awesome</span>
</div>
<h2 class="text-3xl md:text-4xl font-headline font-extrabold tracking-tighter text-on-surface mb-4">How was today's briefing?</h2>
<p class="text-on-surface-variant text-lg leading-relaxed">Your feedback helps the curator refine your morning digest for more relevant insights.</p>
</div>
<!-- Sentiment Selection -->
<div class="grid grid-cols-2 gap-6 w-full mb-10">
<!-- Helpful Option (Active State Simulation) -->
<button class="group flex flex-col items-center justify-center p-8 rounded-xl border-2 border-primary-container bg-primary-container/5 transition-all duration-300 hover:bg-primary-container/10">
<div class="w-16 h-16 rounded-full flex items-center justify-center bg-primary-container text-on-primary mb-4 shadow-lg shadow-primary-container/20 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px]" data-icon="thumb_up" style="font-variation-settings: 'FILL' 1;">thumb_up</span>
</div>
<span class="font-headline font-bold text-primary-container uppercase tracking-widest text-[12px]">Helpful</span>
</button>
<!-- Not for me Option -->
<button class="group flex flex-col items-center justify-center p-8 rounded-xl border-2 border-transparent bg-surface-container-low transition-all duration-300 hover:border-outline-variant/30">
<div class="w-16 h-16 rounded-full flex items-center justify-center bg-surface-container-highest text-on-surface-variant mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px]" data-icon="thumb_down">thumb_down</span>
</div>
<span class="font-headline font-bold text-on-surface-variant uppercase tracking-widest text-[12px]">Not for me</span>
</button>
</div>
<!-- Feedback Input -->
<div class="w-full mb-12">
<label class="block font-headline font-bold text-[10px] uppercase tracking-widest text-on-surface-variant mb-3 ml-1" for="feedback">Additional Comments (Optional)</label>
<div class="relative">
<textarea class="w-full bg-surface-container-highest border-none rounded-xl p-5 text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary-container/20 transition-all resize-none font-body text-base" id="feedback" placeholder="What could be improved?" rows="4"></textarea>
<div class="absolute bottom-4 right-4 opacity-30">
<span class="material-symbols-outlined text-sm" data-icon="edit_note">edit_note</span>
</div>
</div>
</div>
<!-- Action Area -->
<div class="w-full flex flex-col gap-4">
<button class="w-full bg-gradient-to-br from-primary-container to-primary text-on-primary font-headline font-bold py-4 rounded-full text-lg tracking-tight hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-xl shadow-primary-container/25">
                Submit Feedback
            </button>
<button class="w-full py-3 text-on-surface-variant font-headline font-semibold text-sm hover:text-on-surface transition-colors">
                Skip for now
            </button>
</div>
<!-- Visual Polish: Decorative Asymmetry -->
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary-container/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute top-1/4 -right-24 w-64 h-64 bg-tertiary/5 rounded-full blur-[80px] pointer-events-none"></div>
</main>
<!-- Contextual Progress Tracker (As mandated by Design System) -->
<div class="fixed top-[74px] left-0 w-full h-[2px] bg-surface-container overflow-hidden z-[51]">
<div class="h-full bg-gradient-to-r from-primary to-tertiary w-3/4"></div>
</div>
</body></html>
