<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",

                extend: {
                    colors: {
                        "primary-fixed-dim": "#b3c5ff",

                        "surface": "#f9f9f9",

                        "outline": "#737687",
                        "on-surface": "#1a1c1c",
                        "on-tertiary-container": "#fff4f0",
                        "inverse-surface": "#2f3131",
                        "secondary-fixed": "#dbe1ff",
                        "secondary-fixed-dim": "#b3c5ff",
                        "surface-container-highest": "#e2e2e2",
                        "tertiary-fixed-dim": "#ffb59c",
                        "on-secondary-fixed-variant": "#294387",
                        "surface-bright": "#f9f9f9",
                        "secondary": "#425ba0",
                        "on-tertiary-fixed-variant": "#832700",
                        "surface-container-low": "#f3f3f4",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#00174a",
                        "inverse-primary": "#b3c5ff",

                        "inverse-on-surface": "#f0f1f1",
                        "on-primary-fixed-variant": "#003ea6",
                        "primary-container": "#0064ff",
                        "tertiary-fixed": "#ffdbd0",
                        "background": "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "surface-tint": "#0054d8",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dadada",
                        "on-secondary-container": "#294487",
                        "outline-variant": "#c2c6d8",
                        "primary": "#004ecb"

                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm shadow-zinc-200/50 flex justify-between items-center px-6 py-4 w-full">
<div class="bg-gradient-to-r from-blue-600 to-blue-800 h-[2px] w-full absolute top-0 left-0"></div>
<div class="flex items-center gap-4">
<button class="p-2 text-zinc-500 hover:bg-zinc-100 transition-colors active:scale-95 duration-200 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-zinc-900 text-xl">Daily Briefing</h1>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional man with a kind expression in soft, natural studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTbEIPRLb2MC7j9q5Nv-ICtViWLpLjcb-VC7U9uR-yr3lTvUlPIn9ky0dEL9EHFw5YfkKH-h-PC8-yiMAliYZkfet8yIVIo9W2YcotYzzkcRkkUh9TMoTchqdCcWM7xMVA3DzEvvswtGjISK9prn9j9hmlGsmY4AHB-728vWYFwX3tLh5uypM89OP32XEGL1jQNjxxu9Te4efIyaBC_2rLiW-A621BSlRRhZf8zUUUtDIFmIgKzLgMzWB-8TP6h2scKT36MXBfTK0"/>
</div>
</div>
</header>
<!-- Progress Thread (Design System Custom Component) -->
<div class="fixed top-[64px] left-0 w-full h-[2px] bg-gradient-to-r from-primary to-tertiary z-40 opacity-30"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-32 max-w-2xl mx-auto text-center">
<!-- Empty State Illustration Container -->
<div class="relative mb-10 w-full aspect-video max-w-md mx-auto group">
<!-- Background "Sheet" Layering -->
<div class="absolute inset-0 bg-surface-container-low rounded-[2rem] transform -rotate-2 scale-95 opacity-50 transition-transform group-hover:rotate-0 duration-700"></div>
<div class="absolute inset-0 bg-white rounded-[2rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.04)] flex items-center justify-center overflow-hidden">
<div class="relative w-full h-full">
<img alt="Morning Mailbox" class="w-full h-full object-cover opacity-90" data-alt="A minimalist aesthetic photograph of a clean white designer mailbox standing in soft morning sunlight against a pale grey background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDzx9OfpJ4rIiMnFape2uqdEm_qFc0gg9uo1TMTpKUYGgvYyHN2gc2ErU04REiR8y2w8KyAK7vcWXvgkpWjFF47NxjNMmXlSndg9mUUohqeczzI0IVjIDsr1HYidTyIa2e5KG-lI6-_0PDJX02FKUnNfg9X4c5Ruv6o2g46AkeG6-bB_Mlo7QVDGu1C0534lT_C6HBOA4TuQhiIS7YlYM4Xnu3Dt2OVPOPhj5ZZRDraTjoZgy5GolBeeiL9qiujYdiykoVHaWzUGy4"/>
<div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
</div>
</div>
<!-- Contextual Floating Icon -->
<div class="absolute -bottom-4 -right-4 w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-white shadow-xl active:scale-90 transition-transform duration-200 cursor-default">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">bedtime</span>
</div>
</div>
<!-- Typography Stack -->
<div class="space-y-6">
<h2 class="text-[2.75rem] font-extrabold tracking-tight leading-tight text-on-surface">
                Your feed is currently resting.
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-lg mx-auto font-medium opacity-80">
                We couldn't find any updates for your selected topics right now. Why not explore trending news instead?
            </p>
</div>
<!-- Primary CTA -->
<div class="mt-12">
<button class="bg-primary-container text-white px-10 py-4 rounded-full font-bold text-lg hover:bg-on-primary-fixed-variant active:scale-95 transition-all duration-200 shadow-lg shadow-primary-container/20 flex items-center gap-3">
<span>Explore Trending</span>
<span class="material-symbols-outlined">trending_up</span>
</button>
</div>
<!-- Secondary Suggestion (Editorial Pattern) -->
<div class="mt-16 flex flex-col items-center gap-4">
<span class="text-[0.75rem] font-bold tracking-[0.2em] text-zinc-400 uppercase">Suggested for you</span>
<div class="flex gap-3">
<span class="px-4 py-2 bg-surface-container-low rounded-full text-sm font-semibold text-on-surface-variant hover:bg-surface-container transition-colors cursor-pointer">Global Finance</span>
<span class="px-4 py-2 bg-surface-container-low rounded-full text-sm font-semibold text-on-surface-variant hover:bg-surface-container transition-colors cursor-pointer">Tech Insights</span>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only Logic) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-3 pb-8 px-4 bg-white/90 backdrop-blur-xl rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.03)] border-t border-zinc-100">
<a class="flex flex-col items-center justify-center text-blue-600 font-bold transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 hover:text-blue-500 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined text-2xl">explore</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-widest mt-1">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 hover:text-blue-500 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined text-2xl">bookmark</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-widest mt-1">Saved</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 hover:text-blue-500 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined text-2xl">settings</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-widest mt-1">Settings</span>
</a>
</nav>
<!-- Desktop Sidebar/Nav (Hidden on Mobile) -->
<div class="hidden md:flex fixed left-0 top-0 h-screen w-20 flex-col items-center py-8 bg-surface-container-low/30 backdrop-blur-lg border-r border-outline-variant/10 z-50">
<div class="mb-12">
<span class="material-symbols-outlined text-primary text-3xl font-bold">newspaper</span>
</div>
<div class="flex flex-col gap-10">
<button class="text-primary active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">home</span>
</button>
<button class="text-zinc-400 hover:text-primary transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl">explore</span>
</button>
<button class="text-zinc-400 hover:text-primary transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl">bookmark</span>
</button>
<button class="text-zinc-400 hover:text-primary transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
</div>
</body></html>
