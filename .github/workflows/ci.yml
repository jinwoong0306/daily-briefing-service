name: CI

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      use_cache:
        description: "Enable dependency cache (true/false)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  backend-lint-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache == 'true' }}
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest

      - name: Run lint with flake8
        working-directory: backend
        run: flake8 .

      - name: Run tests with pytest
        working-directory: backend
        run: |
          if [ -d tests ] && find tests -type f -name "test*.py" | grep -q .; then
            pytest tests/ -v
          else
            echo "No backend tests yet. Skipping pytest."
          fi

  frontend-lint-test:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache == 'true' }}
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            apps/mobile/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('apps/mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run analyzer
        working-directory: apps/mobile
        run: flutter analyze

      - name: Run tests
        working-directory: apps/mobile
        run: flutter test

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    if: ${{ always() && (needs.backend-lint-test.result == 'failure' || needs.frontend-lint-test.result == 'failure') }}
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"[CI FAILED] ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Send email notification
        if: ${{ secrets.SMTP_HOST != '' && secrets.SMTP_USER != '' && secrets.SMTP_PASS != '' && secrets.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "[CI FAILED] ${{ github.repository }} @ ${{ github.ref_name }}"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          body: |
            CI failed.
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
