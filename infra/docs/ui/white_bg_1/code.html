<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Personalize Your Daily Briefing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#b3c5ff",
              "tertiary-container": "#ca4101",
              "on-primary-container": "#f5f5ff",
              "surface": "#f9f9f9",
              "error-container": "#ffdad6",
              "outline": "#737687",
              "on-surface": "#1a1c1c",
              "on-tertiary-container": "#fff4f0",
              "inverse-surface": "#2f3131",
              "secondary-fixed": "#dbe1ff",
              "secondary-fixed-dim": "#b3c5ff",
              "surface-container-highest": "#e2e2e2",
              "tertiary-fixed-dim": "#ffb59c",
              "on-secondary-fixed-variant": "#294387",
              "surface-bright": "#f9f9f9",
              "secondary": "#425ba0",
              "on-tertiary-fixed-variant": "#832700",
              "surface-container-low": "#f3f3f4",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#dbe1ff",
              "on-error": "#ffffff",
              "on-primary-fixed": "#00174a",
              "inverse-primary": "#b3c5ff",
              "on-surface-variant": "#424656",
              "on-tertiary": "#ffffff",
              "error": "#ba1a1a",
              "on-error-container": "#93000a",
              "secondary-container": "#9bb4ff",
              "on-secondary-fixed": "#00174a",
              "on-tertiary-fixed": "#390c00",
              "on-background": "#1a1c1c",
              "tertiary": "#a03200",
              "surface-variant": "#e2e2e2",
              "on-secondary": "#ffffff",
              "surface-container-high": "#e8e8e8",
              "inverse-on-surface": "#f0f1f1",
              "on-primary-fixed-variant": "#003ea6",
              "primary-container": "#0064ff",
              "tertiary-fixed": "#ffdbd0",
              "background": "#f9f9f9",
              "surface-container": "#eeeeee",
              "surface-tint": "#0054d8",
              "on-primary": "#ffffff",
              "surface-dim": "#dadada",
              "on-secondary-container": "#294487",
              "outline-variant": "#c2c6d8",
              "primary": "#004ecb"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col">
<!-- Subtle Reading Progress Bar (As defined in Design System) -->
<div class="fixed top-0 left-0 w-full h-[2px] bg-gradient-to-r from-primary to-tertiary z-[60]"></div>
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 md:py-24 max-w-2xl mx-auto w-full">
<!-- Header Section -->
<header class="w-full mb-12 space-y-4">
<div class="flex items-center gap-2 mb-8">
<div class="w-8 h-8 bg-gradient-to-br from-primary-container to-primary rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">auto_stories</span>
</div>
<span class="font-headline font-extrabold tracking-tighter text-primary text-xl">Daily Briefing</span>
</div>
<h1 class="text-[2.75rem] font-headline font-extrabold leading-[1.1] tracking-tight text-on-surface">
                Personalize your Daily Briefing
            </h1>
<p class="text-body-lg text-on-surface-variant leading-relaxed max-w-md">
                Select at least 3 topics to build your custom feed. We'll curate the most relevant stories for your interests.
            </p>
</header>
<!-- Topics Selection (Asymmetric Layout Focus) -->
<section class="w-full mb-12">
<div class="flex flex-wrap gap-3">
<!-- IT/Science (Active) -->
<button class="px-6 py-3 rounded-full bg-primary-container text-white font-semibold text-sm transition-all active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
                    IT/Science
                </button>
<!-- Finance (Inactive) -->
<button class="px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-all active:scale-95">
                    Finance
                </button>
<!-- Entertainment (Active) -->
<button class="px-6 py-3 rounded-full bg-primary-container text-white font-semibold text-sm transition-all active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
                    Entertainment
                </button>
<!-- World News (Active) -->
<button class="px-6 py-3 rounded-full bg-primary-container text-white font-semibold text-sm transition-all active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
                    World News
                </button>
<!-- Sports (Inactive) -->
<button class="px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-all active:scale-95">
                    Sports
                </button>
<!-- Wellness (Inactive) -->
<button class="px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-all active:scale-95">
                    Wellness
                </button>
<!-- Arts & Culture (Inactive) -->
<button class="px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-all active:scale-95">
                    Arts &amp; Culture
                </button>
</div>
</section>
<!-- Delivery Preference -->
<section class="w-full mb-16 space-y-6">
<div class="flex flex-col gap-1">
<h2 class="text-sm font-bold uppercase tracking-widest text-primary">Delivery Preference</h2>
<p class="text-on-surface-variant text-sm">When should we deliver your briefing?</p>
</div>
<div class="inline-flex items-center gap-6 bg-surface-container-low p-2 rounded-2xl">
<div class="flex items-center gap-4 px-6 py-4 bg-white rounded-xl shadow-sm">
<span class="material-symbols-outlined text-primary">schedule</span>
<span class="text-2xl font-headline font-bold text-on-surface">08:00</span>
<div class="flex flex-col border-l border-surface-container-highest pl-4 ml-2">
<span class="text-xs font-bold text-primary">AM</span>
<span class="text-xs font-bold text-on-surface-variant/30">PM</span>
</div>
</div>
<div class="pr-6">
<p class="text-xs font-semibold text-on-surface-variant leading-tight">Optimized for your<br/>morning commute.</p>
</div>
</div>
</section>
<!-- Action Button -->
<footer class="w-full pt-4 border-t border-surface-container-low">
<button class="w-full md:w-auto px-12 py-5 rounded-full bg-gradient-to-br from-primary-container to-primary text-white font-bold text-lg shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                Start Reading
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
</main>
<!-- Visual Embellishment (Asymmetric background element) -->
<div class="fixed top-20 -right-20 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none z-0"></div>
<div class="fixed -bottom-20 -left-20 w-80 h-80 bg-tertiary/5 rounded-full blur-3xl pointer-events-none z-0"></div>
</body></html>
